name: Quality

on: [pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
      # Single Chromium (not the full matrix) so the Playwright contract tests
      # can run. Full browser matrix + Lighthouse stay local (release gate).
      - run: npx playwright install --with-deps chromium
      - run: npm run test:contracts
